<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Excel 任务列表</title>
  <style>
    :root {
      --bg: #f4efe7;
      --panel: #fffaf2;
      --panel-2: #f6eee2;
      --line: #d7cab7;
      --text: #221d18;
      --muted: #766b61;
      --accent: #0d6b5a;
      --danger: #a53c34;
      --shadow: 0 20px 44px rgba(73, 52, 30, 0.12);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(13, 107, 90, 0.14), transparent 30%),
        radial-gradient(circle at top right, rgba(206, 121, 47, 0.12), transparent 24%),
        linear-gradient(180deg, #fbf7f0 0%, var(--bg) 100%);
      min-height: 100vh;
    }
    .page {
      width: min(1220px, calc(100% - 32px));
      margin: 24px auto 40px;
    }
    .hero {
      padding: 28px;
      border-radius: 24px;
      color: #f8f6f1;
      background: linear-gradient(135deg, rgba(13, 107, 90, 0.96), rgba(8, 77, 66, 0.96));
      box-shadow: var(--shadow);
      margin-bottom: 22px;
    }
    .hero h1 { margin: 0 0 8px; font-size: clamp(28px, 4vw, 42px); }
    .hero p { margin: 0; max-width: 760px; line-height: 1.6; color: rgba(248,246,241,0.84); }
    .layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
      align-items: start;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .panel-head {
      padding: 18px 22px 14px;
      background: linear-gradient(180deg, rgba(246, 238, 226, 0.9), rgba(255, 250, 242, 0.5));
      border-bottom: 1px solid rgba(215, 202, 183, 0.85);
    }
    .panel-head h2 { margin: 0 0 6px; font-size: 18px; }
    .panel-head p { margin: 0; color: var(--muted); font-size: 14px; line-height: 1.5; }
    .panel-body { padding: 20px 22px 22px; }
    form { display: grid; gap: 16px; }
    .field { display: grid; gap: 8px; }
    label { font-size: 14px; font-weight: 600; }
    input[type="file"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--panel-2);
      color: var(--text);
      font: inherit;
    }
    .actions { display: flex; gap: 12px; flex-wrap: wrap; }
    button, .link-button {
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
    }
    .primary, .link-button { background: var(--accent); color: #f7f4ef; }
    .secondary { background: #eadfce; color: var(--text); }
    .status { min-height: 24px; color: var(--muted); font-size: 14px; }
    .status.error { color: var(--danger); }
    .table-shell {
      border: 1px solid rgba(215, 202, 183, 0.9);
      border-radius: 18px;
      overflow: hidden;
      background: #fffdf8;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      text-align: left;
      padding: 16px 14px;
      border-bottom: 1px solid rgba(215, 202, 183, 0.75);
      font-size: 14px;
      vertical-align: middle;
    }
    th {
      background: var(--panel-2);
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }
    tr:last-child td { border-bottom: 0; }
    tbody tr {
      cursor: pointer;
      transition: background 140ms ease, transform 140ms ease;
    }
    tbody tr:hover {
      background: #f1f8f5;
    }
    tbody tr:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: -2px;
    }
    .file-name {
      font-weight: 700;
      line-height: 1.5;
      word-break: break-word;
    }
    .task-id {
      font-family: Consolas, "SFMono-Regular", monospace;
      font-size: 12px;
      color: var(--muted);
      word-break: break-all;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 4px 10px;
      border-radius: 999px;
      background: #edf5f2;
      color: var(--accent);
      font-weight: 700;
      font-size: 12px;
    }
    .num {
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }
    .time {
      white-space: nowrap;
    }
    .empty {
      padding: 16px;
      border-radius: 16px;
      border: 1px dashed var(--line);
      background: var(--panel-2);
      color: var(--muted);
      font-size: 14px;
    }
    @media (max-width: 980px) {
      .layout { grid-template-columns: 1fr; }
      .table-shell {
        border: 0;
        background: transparent;
      }
      table, thead, tbody, th, td, tr { display: block; }
      thead { display: none; }
      tr {
        margin-bottom: 12px;
        border: 1px solid rgba(215, 202, 183, 0.9);
        border-radius: 16px;
        background: #fffdf8;
      }
      td { padding: 10px 12px; border-bottom: 0; }
      td::before {
        content: attr(data-label);
        display: block;
        margin-bottom: 4px;
        color: var(--muted);
        font-size: 12px;
        text-transform: uppercase;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <h1>Excel 任务列表</h1>
      <p>这里统一管理任务。左侧新建任务，右侧表格查看所有任务，点击任意任务进入详情页继续追加更新。</p>
    </section>

    <section class="layout">
      <article class="panel">
        <div class="panel-head">
          <h2>新建任务</h2>
          <p>上传一个 Excel，系统会创建一个持久任务。后续所有更新都在任务详情页里继续进行。</p>
        </div>
        <div class="panel-body">
          <form id="uploadForm">
            <div class="field">
              <label for="file">上传 Excel</label>
              <input id="file" type="file" accept=".xlsx" required>
            </div>
            <div class="actions">
              <button id="createTaskButton" class="primary" type="submit">创建任务</button>
              <button id="reloadTasksButton" class="secondary" type="button">刷新列表</button>
            </div>
            <div id="status" class="status"></div>
          </form>
        </div>
      </article>

      <article class="panel">
        <div class="panel-head">
          <h2>任务表格</h2>
          <p>点击任意一行即可打开当前任务详情页。</p>
        </div>
        <div class="panel-body" id="tablePanel">
          <div class="empty">正在加载任务列表...</div>
        </div>
      </article>
    </section>
  </main>

  <script>
    const uploadForm = document.getElementById("uploadForm");
    const statusEl = document.getElementById("status");
    const tablePanel = document.getElementById("tablePanel");
    const createTaskButton = document.getElementById("createTaskButton");
    const reloadTasksButton = document.getElementById("reloadTasksButton");

    function setStatus(message, isError = false) {
      statusEl.textContent = message || "";
      statusEl.classList.toggle("error", Boolean(isError));
    }

    function toText(value) {
      return value == null || value === "" ? "未设置" : String(value);
    }

    function formatDate(value) {
      if (!value) return "-";
      return new Date(value).toLocaleString("zh-CN", { hour12: false });
    }

    function renderTasks(tasks) {
      if (!tasks.length) {
        tablePanel.innerHTML = `<div class="empty">还没有任务，先创建一个。</div>`;
        return;
      }

      tablePanel.innerHTML = `
        <div class="table-shell">
        <table>
          <colgroup>
            <col style="width: 30%;">
            <col style="width: 34%;">
            <col style="width: 10%;">
            <col style="width: 14%;">
            <col style="width: 12%;">
          </colgroup>
          <thead>
            <tr>
              <th>文件名</th>
              <th>任务 ID</th>
              <th>操作次数</th>
              <th>最新列</th>
              <th>更新时间</th>
            </tr>
          </thead>
          <tbody>
            ${tasks.map(task => `
              <tr data-href="/pages/excel-update?task_id=${encodeURIComponent(task.task_id)}" tabindex="0">
                <td data-label="文件名"><div class="file-name">${task.file_name}</div></td>
                <td data-label="任务 ID"><div class="task-id">${task.task_id}</div></td>
                <td data-label="操作次数"><span class="num">${task.operation_count}</span></td>
                <td data-label="最新列"><span class="pill">${toText(task.latest_target_column)}</span></td>
                <td data-label="更新时间"><span class="time">${formatDate(task.updated_at)}</span></td>
              </tr>
            `).join("")}
          </tbody>
        </table>
        </div>
      `;

      tablePanel.querySelectorAll("tr[data-href]").forEach(row => {
        const href = row.getAttribute("data-href");
        row.addEventListener("click", () => {
          window.location.href = href;
        });
        row.addEventListener("keydown", event => {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            window.location.href = href;
          }
        });
      });
    }

    async function loadTasks() {
      const response = await fetch("/workflow/excel-update/tasks");
      const payload = await response.json().catch(() => []);
      if (!response.ok) {
        throw new Error(payload.detail || "获取任务列表失败");
      }
      renderTasks(payload);
    }

    uploadForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      const fileInput = document.getElementById("file");
      if (!fileInput.files || !fileInput.files.length) {
        setStatus("请先选择 Excel 文件。", true);
        return;
      }
      createTaskButton.disabled = true;
      setStatus("正在创建任务...");
      try {
        const formData = new FormData();
        formData.append("file", fileInput.files[0]);
        const response = await fetch("/workflow/excel-update/tasks", {
          method: "POST",
          body: formData
        });
        const payload = await response.json().catch(() => ({}));
        if (!response.ok) {
          throw new Error(payload.detail || "创建任务失败");
        }
        window.location.href = `/pages/excel-update?task_id=${encodeURIComponent(payload.task_id)}`;
      } catch (error) {
        setStatus(error.message || "创建任务失败", true);
      } finally {
        createTaskButton.disabled = false;
      }
    });

    reloadTasksButton.addEventListener("click", async () => {
      reloadTasksButton.disabled = true;
      setStatus("正在刷新任务列表...");
      try {
        await loadTasks();
        setStatus("任务列表已刷新");
      } catch (error) {
        setStatus(error.message || "刷新任务列表失败", true);
      } finally {
        reloadTasksButton.disabled = false;
      }
    });

    loadTasks().catch(error => {
      setStatus(error.message || "初始化页面失败", true);
      tablePanel.innerHTML = `<div class="empty">${error.message || "初始化页面失败"}</div>`;
    });
  </script>
</body>
</html>
