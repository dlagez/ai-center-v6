<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PDF Preview Demo</title>
    <link rel="stylesheet" href="/static/pdf-preview/demo.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="panel controls-panel">
        <h1>PDF Preview Demo</h1>
        <p class="muted">上传 PDF，预览原始文档，并按 page_no + bbox_norm 调试高亮。</p>

        <form id="upload-form" class="stack">
          <label class="field">
            <span>选择 PDF</span>
            <input id="pdf-file" name="file" type="file" accept="application/pdf" required />
          </label>
          <button type="submit">上传并加载</button>
        </form>

        <div class="stack">
          <label class="field">
            <span>跳转页码</span>
            <input id="go-to-page" type="number" min="1" step="1" value="1" />
          </label>
          <button id="go-to-page-btn" type="button">跳转</button>
        </div>

        <div class="stack">
          <label class="field">
            <span>高亮页码 page_no</span>
            <input id="highlight-page" type="number" min="1" step="1" value="1" />
          </label>
          <label class="field">
            <span>bbox_norm</span>
            <input id="highlight-bbox" type="text" value="[0.1,0.1,0.6,0.2]" />
          </label>
          <div class="button-row">
            <button id="add-highlight-btn" type="button">添加高亮</button>
            <button id="clear-highlight-btn" type="button">清空高亮</button>
          </div>
        </div>

        <div class="stack">
          <h2>当前 Session</h2>
          <pre id="session-output">尚未上传 PDF</pre>
        </div>
      </section>

      <section class="panel preview-panel">
        <div id="pdf-preview-root" class="pdf-preview-root"></div>
      </section>
    </main>

    <script type="module" src="/static/pdf-preview/demo.js"></script>
  </body>
  </html>
