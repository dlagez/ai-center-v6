<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Excel 任务详情</title>
  <style>
    :root {
      --bg: #f4efe7;
      --panel: #fffaf2;
      --panel-2: #f6eee2;
      --panel-3: #f1f8f5;
      --line: #d7cab7;
      --text: #221d18;
      --muted: #766b61;
      --accent: #0d6b5a;
      --accent-2: #0a5447;
      --danger: #a53c34;
      --shadow: 0 20px 44px rgba(73, 52, 30, 0.12);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(13, 107, 90, 0.14), transparent 30%),
        radial-gradient(circle at top right, rgba(206, 121, 47, 0.12), transparent 24%),
        linear-gradient(180deg, #fbf7f0 0%, var(--bg) 100%);
      min-height: 100vh;
    }
    .page {
      width: min(1180px, calc(100% - 32px));
      margin: 24px auto 40px;
    }
    .hero {
      padding: 28px;
      border-radius: 24px;
      color: #f8f6f1;
      background: linear-gradient(135deg, rgba(13, 107, 90, 0.96), rgba(8, 77, 66, 0.96));
      box-shadow: var(--shadow);
      margin-bottom: 22px;
    }
    .hero h1 { margin: 0 0 8px; font-size: clamp(28px, 4vw, 42px); }
    .hero p { margin: 0; max-width: 820px; line-height: 1.6; color: rgba(248, 246, 241, 0.84); }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }
    .floating-log {
      position: fixed;
      right: 24px;
      bottom: 24px;
      width: min(360px, calc(100vw - 32px));
      padding: 16px 18px;
      border-radius: 18px;
      background: rgba(12, 86, 72, 0.96);
      color: #f7f4ef;
      box-shadow: 0 22px 40px rgba(12, 86, 72, 0.28);
      z-index: 20;
      opacity: 0;
      transform: translateY(12px);
      pointer-events: none;
      transition: opacity 180ms ease, transform 180ms ease;
    }
    .floating-log.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .floating-log h3 {
      margin: 0 0 8px;
      font-size: 15px;
    }
    .floating-log p {
      margin: 6px 0 0;
      line-height: 1.55;
      font-size: 13px;
      color: rgba(247, 244, 239, 0.9);
    }
    .task-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 14px;
      margin-bottom: 20px;
    }
    .task-card {
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 18px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }
    .task-card.active {
      background: linear-gradient(180deg, rgba(241, 248, 245, 0.98), rgba(255, 250, 242, 0.98));
      border-color: rgba(13, 107, 90, 0.45);
      box-shadow: 0 18px 36px rgba(13, 107, 90, 0.12);
    }
    .task-card h3 {
      margin: 0 0 8px;
      font-size: 18px;
    }
    .task-card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
      font-size: 13px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 4px 10px;
      border-radius: 999px;
      background: #e9f4f0;
      color: var(--accent-2);
      font-weight: 700;
      font-size: 12px;
      margin-bottom: 12px;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: var(--shadow);
      overflow: hidden;
      margin-bottom: 20px;
    }
    .panel-head {
      padding: 18px 22px 14px;
      background: linear-gradient(180deg, rgba(246, 238, 226, 0.9), rgba(255, 250, 242, 0.5));
      border-bottom: 1px solid rgba(215, 202, 183, 0.85);
    }
    .panel-head h2 { margin: 0 0 6px; font-size: 18px; }
    .panel-head p { margin: 0; color: var(--muted); font-size: 14px; line-height: 1.5; }
    .panel-body { padding: 20px 22px 22px; }
    form { display: grid; gap: 16px; }
    .field { display: grid; gap: 8px; }
    .prompt-shortcuts {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .prompt-chip {
      border: 1px solid rgba(13, 107, 90, 0.22);
      border-radius: 14px;
      padding: 10px 12px;
      background: #eef7f3;
      color: var(--accent-2);
      font-size: 13px;
      line-height: 1.45;
      cursor: pointer;
      text-align: left;
    }
    .prompt-chip:hover {
      background: #e4f2ed;
    }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    label { font-size: 14px; font-weight: 600; }
    input[type="text"], textarea {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fffdf9;
      color: var(--text);
      font: inherit;
    }
    input[type="file"], select {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fffdf9;
      color: var(--text);
      font: inherit;
    }
    textarea { min-height: 110px; resize: vertical; line-height: 1.5; }
    .checkbox {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 48px;
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid rgba(215, 202, 183, 0.9);
      background: var(--panel-2);
    }
    .actions { display: flex; gap: 12px; flex-wrap: wrap; }
    button, .link-button {
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
    }
    .link-button, .primary { background: var(--accent); color: #f7f4ef; }
    .secondary { background: #eadfce; color: var(--text); }
    .status { min-height: 24px; color: var(--muted); font-size: 14px; }
    .status.error { color: var(--danger); }
    .log-list {
      display: grid;
      gap: 16px;
    }
    .log-item {
      position: relative;
      border: 1px solid rgba(215, 202, 183, 0.9);
      border-radius: 20px;
      background: #fffdf8;
      padding: 18px;
      overflow: hidden;
    }
    .log-item::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 6px;
      background: linear-gradient(180deg, var(--accent), rgba(13, 107, 90, 0.2));
    }
    .log-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      flex-wrap: wrap;
      margin-bottom: 10px;
      padding-left: 8px;
    }
    .log-title {
      display: grid;
      gap: 4px;
    }
    .log-title strong { font-size: 17px; }
    .muted { color: var(--muted); }
    .summary-line {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      padding-left: 8px;
      margin-bottom: 12px;
    }
    .summary-pill {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 4px 10px;
      border-radius: 999px;
      background: var(--panel-3);
      color: var(--accent-2);
      font-size: 12px;
      font-weight: 700;
    }
    .log-grid {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 14px;
      margin-top: 10px;
      padding-left: 8px;
    }
    .block {
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid rgba(215, 202, 183, 0.9);
      background: var(--panel-2);
    }
    .block h4 {
      margin: 0 0 8px;
      font-size: 14px;
    }
    .block pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: Consolas, "SFMono-Regular", monospace;
      font-size: 12px;
      line-height: 1.55;
    }
    .scroll-pre {
      max-height: 240px;
      overflow: auto;
      padding-right: 6px;
    }
    .scroll-pre::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    .scroll-pre::-webkit-scrollbar-thumb {
      background: rgba(118, 107, 97, 0.35);
      border-radius: 999px;
    }
    .scroll-pre::-webkit-scrollbar-track {
      background: rgba(215, 202, 183, 0.2);
      border-radius: 999px;
    }
    .meta-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }
    .meta-item {
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid rgba(215, 202, 183, 0.9);
      background: #fffdf8;
    }
    .meta-item .label {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
    }
    .meta-item .value {
      font-weight: 700;
      line-height: 1.5;
      word-break: break-word;
    }
    .empty {
      padding: 16px;
      border-radius: 16px;
      border: 1px dashed var(--line);
      background: var(--panel-2);
      color: var(--muted);
      font-size: 14px;
    }
    @media (max-width: 920px) {
      .two-col, .log-grid, .meta-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <h1>任务详情</h1>
      <p>详情页按任务类型卡片、操作区、操作日志和任务摘要组织。当前只有一种任务类型，后续可以继续扩展更多任务卡片。</p>
    </section>

    <div class="topbar">
      <a class="link-button" href="/pages/excel-update/tasks">返回任务列表</a>
      <button id="refreshDetailButton" class="secondary" type="button">刷新当前详情</button>
    </div>

    <section class="task-cards">
      <article class="task-card active">
        <div class="badge">当前可用</div>
        <h3>Excel 批量更新</h3>
        <p>基于同一个 Excel 任务持续追加多次字段更新。每次执行都会保留独立表格文件、操作记录和下载入口。</p>
      </article>
    </section>

    <section class="panel">
      <div class="panel-head">
        <h2>执行操作</h2>
        <p>先输入本次更新指令，再执行。操作完成后，会在下面追加一条新的日志记录。</p>
      </div>
      <div class="panel-body">
        <form id="operationForm">
          <div class="field">
            <label>当前任务 ID</label>
            <input id="taskIdDisplay" type="text" readonly>
          </div>
          <div class="field">
            <label for="sourceType">数据来源</label>
            <select id="sourceType">
              <option value="pm_api">PM/API 获取数据</option>
              <option value="excel_file">源 Excel 获取数据</option>
            </select>
          </div>
          <div id="sourceFileField" class="field" style="display:none;">
            <label for="sourceFile">源 Excel 文件</label>
            <input id="sourceFile" type="file" accept=".xlsx">
          </div>
          <div class="field">
            <label for="userPrompt">操作描述</label>
            <textarea id="userPrompt" spellcheck="false" placeholder="例如：把这张表 3 月实际产值更新一下；下一次可以再填 3 月回款。"></textarea>
            <div class="prompt-shortcuts">
              <button class="prompt-chip" type="button" data-prompt="使用源excel的项目编号、回款金额，来更新清欠表的三月回款。">使用源excel的项目编号、回款金额，来更新清欠表的三月回款。</button>
              <button class="prompt-chip" type="button" data-prompt="调用pm api接口或者3月实际产值数据，把这张表3月实际产值更新一下。">调用pm api接口或者3月实际产值数据，把这张表3月实际产值更新一下。</button>
            </div>
          </div>
          <div class="actions">
            <button id="runOperationButton" class="primary" type="submit">执行当前操作</button>
          </div>
          <div id="status" class="status"></div>
        </form>
      </div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <h2>操作日志</h2>
        <p>每次操作会保存一份独立表格文件。这里按时间顺序展示日志、参数、错误、未匹配项和对应下载入口。</p>
      </div>
      <div class="panel-body" id="logPanel">
        <div class="empty">正在加载操作日志...</div>
      </div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <h2>任务详情</h2>
        <p>任务级别的汇总信息放在操作日志下面，方便先看过程，再看当前状态。</p>
      </div>
      <div class="panel-body" id="detailPanel">
        <div class="empty">正在加载任务摘要...</div>
      </div>
    </section>
  </main>
  <aside id="floatingLog" class="floating-log" aria-live="polite"></aside>

  <script>
    const params = new URLSearchParams(window.location.search);
    const taskId = params.get("task_id") || "";
    const operationForm = document.getElementById("operationForm");
    const logPanel = document.getElementById("logPanel");
    const detailPanel = document.getElementById("detailPanel");
    const statusEl = document.getElementById("status");
    const floatingLogEl = document.getElementById("floatingLog");
    const userPromptEl = document.getElementById("userPrompt");
    const sourceTypeEl = document.getElementById("sourceType");
    const sourceFileFieldEl = document.getElementById("sourceFileField");
    const refreshDetailButton = document.getElementById("refreshDetailButton");
    const runOperationButton = document.getElementById("runOperationButton");
    document.getElementById("taskIdDisplay").value = taskId;

    function setStatus(message, isError = false) {
      statusEl.textContent = message || "";
      statusEl.classList.toggle("error", Boolean(isError));
    }

    function pretty(value) {
      return JSON.stringify(value, null, 2);
    }

    function toText(value) {
      return value == null || value === "" ? "未设置" : String(value);
    }

    function formatDate(value) {
      if (!value) return "-";
      return new Date(value).toLocaleString("zh-CN", { hour12: false });
    }

    let floatingLogTimer = null;

    function showRecognitionLog(operation) {
      const sheetName = operation.analysis?.sheet_name || operation.request?.sheet_name || "未识别";
      const targetColumn = operation.analysis?.target_column || operation.request?.target_column || "未识别";
      const sourceType = operation.request?.source_type === "excel_file" ? "源 Excel" : "PM/API";
      const sourceMatchColumn = operation.analysis?.source_match_column || operation.request?.source_match_column || "未识别";
      const sourceValueColumn = operation.analysis?.source_value_column || operation.request?.source_value_column || "未识别";
      floatingLogEl.innerHTML = `
        <h3>识别结果</h3>
        <p>数据来源：${sourceType}</p>
        <p>sheet页：${sheetName}</p>
        <p>目标列名：${targetColumn}</p>
        ${operation.request?.source_type === "excel_file" ? `<p>源列：${sourceMatchColumn} / ${sourceValueColumn}</p>` : ""}
      `;
      floatingLogEl.classList.add("visible");
      if (floatingLogTimer) {
        clearTimeout(floatingLogTimer);
      }
      floatingLogTimer = setTimeout(() => {
        floatingLogEl.classList.remove("visible");
      }, 3600);
    }

    function renderLogs(task) {
      const operations = task.operations || [];
      if (!operations.length) {
        logPanel.innerHTML = `<div class="empty">这个任务还没有任何操作记录。</div>`;
        return;
      }

      const ordered = [...operations].sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
      logPanel.innerHTML = `
        <div class="log-list">
          ${ordered.map(op => `
            <article class="log-item">
              <div class="log-head">
                <div class="log-title">
                  <strong>第 ${op.sequence} 次操作</strong>
                  <span class="muted">${formatDate(op.created_at)}</span>
                </div>
                <div class="actions">
                  <a class="link-button" href="${op.download_url}" target="_blank" rel="noreferrer">下载本次表格</a>
                </div>
              </div>

              <div class="summary-line">
                <span class="summary-pill">来源：${op.request?.source_type === "excel_file" ? "源 Excel" : "PM/API"}</span>
                <span class="summary-pill">sheet页：${toText(op.analysis?.sheet_name || op.request?.sheet_name)}</span>
                <span class="summary-pill">目标列：${toText(op.request?.target_column)}</span>
                ${op.request?.source_type === "excel_file" ? `<span class="summary-pill">源列：${toText(op.analysis?.source_match_column || op.request?.source_match_column)} / ${toText(op.analysis?.source_value_column || op.request?.source_value_column)}</span>` : ""}
                <span class="summary-pill">更新单元格：${op.result?.summary?.updated_cells ?? 0}</span>
                <span class="summary-pill">匹配记录：${op.result?.summary?.matched_records ?? 0}</span>
                <span class="summary-pill">错误数：${op.result?.summary?.error_count ?? 0}</span>
              </div>

              <div class="log-grid">
                <div class="block">
                  <h4>操作记录</h4>
                  <pre>${pretty({
                    operation_id: op.operation_id,
                    source_type: op.request?.source_type,
                    source_excel_path: op.request?.source_excel_path,
                    recognized_source_sheet_name: op.analysis?.source_sheet_name || op.request?.source_sheet_name,
                    recognized_source_match_column: op.analysis?.source_match_column || op.request?.source_match_column,
                    recognized_source_value_column: op.analysis?.source_value_column || op.request?.source_value_column,
                    user_prompt: op.request?.user_prompt,
                    recognized_sheet_name: op.analysis?.sheet_name || op.request?.sheet_name,
                    recognized_target_column: op.analysis?.target_column || op.request?.target_column,
                    target_column: op.request?.target_column,
                    match_column: op.request?.match_column,
                    match_field: op.request?.match_field
                  })}</pre>
                </div>
                <div class="block">
                  <h4>变更记录</h4>
                  <pre class="scroll-pre">${pretty(op.result?.changes || [])}</pre>
                </div>
              </div>
            </article>
          `).join("")}
        </div>
      `;
    }

    function renderDetail(task) {
      detailPanel.innerHTML = `
        <div class="meta-grid">
          <div class="meta-item">
            <div class="label">文件名</div>
            <div class="value">${task.file_name}</div>
          </div>
          <div class="meta-item">
            <div class="label">任务 ID</div>
            <div class="value">${task.task_id}</div>
          </div>
          <div class="meta-item">
            <div class="label">创建时间</div>
            <div class="value">${formatDate(task.created_at)}</div>
          </div>
          <div class="meta-item">
            <div class="label">更新时间</div>
            <div class="value">${formatDate(task.updated_at)}</div>
          </div>
          <div class="meta-item">
            <div class="label">操作次数</div>
            <div class="value">${task.operation_count}</div>
          </div>
          <div class="meta-item">
            <div class="label">当前最新列</div>
            <div class="value">${toText(task.latest_target_column)}</div>
          </div>
          <div class="meta-item">
            <div class="label">当前文件</div>
            <div class="value">${task.latest_output_file_name}</div>
          </div>
          <div class="meta-item">
            <div class="label">下载当前最新文件</div>
            <div class="value"><a class="link-button" href="${task.download_url}" target="_blank" rel="noreferrer">下载最新表格</a></div>
          </div>
        </div>
      `;
    }

    async function loadDetail() {
      if (!taskId) {
        logPanel.innerHTML = `<div class="empty">缺少 task_id，请从任务列表页进入。</div>`;
        detailPanel.innerHTML = `<div class="empty">缺少 task_id，请从任务列表页进入。</div>`;
        runOperationButton.disabled = true;
        return;
      }

      const response = await fetch(`/workflow/excel-update/tasks/${encodeURIComponent(taskId)}`);
      const payload = await response.json().catch(() => ({}));
      if (!response.ok) {
        throw new Error(payload.detail || "获取任务详情失败");
      }
      renderLogs(payload);
      renderDetail(payload);
    }

    function syncSourceFields() {
      sourceFileFieldEl.style.display = sourceTypeEl.value === "excel_file" ? "grid" : "none";
    }

    operationForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      if (!taskId) {
        setStatus("缺少任务 ID，请从任务列表页进入。", true);
        return;
      }
      runOperationButton.disabled = true;
      refreshDetailButton.disabled = true;
      setStatus("正在执行更新操作...");
      try {
        const formData = new FormData();
        formData.append("source_type", sourceTypeEl.value);
        if (sourceTypeEl.value === "excel_file") {
          const sourceFile = document.getElementById("sourceFile").files?.[0];
          if (!sourceFile) {
            throw new Error("请选择源 Excel 文件");
          }
          formData.append("source_file", sourceFile);
        }
        formData.append("user_prompt", document.getElementById("userPrompt").value.trim());

        const response = await fetch(`/workflow/excel-update/tasks/${encodeURIComponent(taskId)}/operations`, {
          method: "POST",
          body: formData
        });
        const payload = await response.json().catch(() => ({}));
        if (!response.ok) {
          throw new Error(payload.detail || "执行更新操作失败");
        }
        await loadDetail();
        showRecognitionLog(payload);
        setStatus(`已完成第 ${payload.sequence} 次操作，更新列：${payload.request?.target_column || "未指定"}`);
      } catch (error) {
        setStatus(error.message || "执行更新操作失败", true);
      } finally {
        runOperationButton.disabled = false;
        refreshDetailButton.disabled = false;
      }
    });

    refreshDetailButton.addEventListener("click", async () => {
      refreshDetailButton.disabled = true;
      setStatus("正在刷新任务详情...");
      try {
        await loadDetail();
        setStatus(`任务详情已刷新：${taskId}`);
      } catch (error) {
        setStatus(error.message || "刷新任务详情失败", true);
      } finally {
        refreshDetailButton.disabled = false;
      }
    });

    sourceTypeEl.addEventListener("change", syncSourceFields);
    document.querySelectorAll(".prompt-chip").forEach(button => {
      button.addEventListener("click", () => {
        userPromptEl.value = button.getAttribute("data-prompt") || "";
        userPromptEl.focus();
      });
    });
    syncSourceFields();

    loadDetail().catch(error => {
      setStatus(error.message || "初始化页面失败", true);
      logPanel.innerHTML = `<div class="empty">${error.message || "初始化页面失败"}</div>`;
      detailPanel.innerHTML = `<div class="empty">${error.message || "初始化页面失败"}</div>`;
    });
  </script>
</body>
</html>
